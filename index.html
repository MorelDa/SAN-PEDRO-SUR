<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Party | ¡Siente el Ritmo!</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff007a;
            --secondary: #00d4ff;
            --dark: #0f0f1b;
            --light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Reproductor Estilizado */
        .player-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--secondary);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 212, 255, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
        }

        audio {
            width: 100%;
            margin: 20px 0;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        /* Secciones de Contenido */
        .content-sections {
            width: 90%;
            max-width: 1000px;
            margin-top: 3rem;
        }

        .section-title {
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            margin: 2rem 0;
            text-align: left;
        }

        .viral-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .viral-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .viral-item:hover {
            transform: translateY(-5px);
            background: #252545;
        }

        footer {
            background: #05050a;
            padding: 2rem;
            margin-top: auto;
            text-align: center;
        }

        .social-links {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .social-links a {
            color: var(--light);
            margin: 0 15px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-compact-disc"></i> Radio Party</div>
        <nav>
            <i class="fas fa-tv" title="Televisión"></i> 
            <span style="margin: 0 15px;">|</span>
            <i class="fas fa-share-alt" title="Redes Sociales"></i>
        </nav>
    </header>

    <main class="main-container">
        <div class="player-card">
            <div class="status">
                <div class="pulse"></div> EN VIVO AHORA
            </div>
            <h1 style="margin: 0;">Radio Party</h1>
            <p style="opacity: 0.7;">La música que mueve tu mundo</p>
            
            <audio controls autoplay>
                <source src="https://morcast.caster.fm:14697/DHGZf?token=53af68f11fa8c97d354847aa7df48167" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>

            <div style="font-size: 0.8rem; opacity: 0.5;">
                Stream: morcast.caster.fm
            </div>
        </div>

        <section class="content-sections">
            <div class="section-title">
                <h2><i class="fas fa-fire"></i> Lo más viral</h2>
            </div>
            <div class="viral-grid" id="viral-container">
                <!-- Los 100 temas virales se cargarían aquí dinámicamente -->
                <div class="viral-item">#Top 1: Trending Topic</div>
                <div class="viral-item">#Top 2: Nuevo Hit Verano</div>
                <div class="viral-item">#Top 3: Festival 2026</div>
                <div class="viral-item">#Top 4: Podcast del Día</div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
        <p>&copy; 2026 Radio Party - Todos los derechos reservados.</p>
    </footer>

    <script>
        // Función para simular la carga de los 100 temas virales
        const container = document.getElementById('viral-container');
        for (let i = 5; i <= 20; i++) {
            const div = document.createElement('div');
            div.className = 'viral-item';
            div.innerText = `#Top ${i}: Tema Viral `;
            container.appendChild(div);
        }
    </script>
</body>
</html>

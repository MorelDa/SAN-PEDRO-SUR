<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTAL SAN PEDRO SUR | Oficial</title>
    
    <!-- Configuración PWA -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/qvhbS6zF/Airbrush-BG-CHANGER-1775689938420-png-removebg-preview.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Y4xc5xz7/IMAGEN-512-X-512-PORTADA-Y-LOGO.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --red: #ff7300; }
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; overflow: hidden; }
        
        /* HERO */
        .hero { 
            width: 100%; height: 85vh; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, black 90%, transparent 100%); 
            -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%); 
        }
        .hero video { width: 100%; height: 100%; object-fit: cover; }

        /* HEADER ORIGINAL */
        .header-main { 
            position: relative; 
            margin-top: -240px; 
            padding: 0 5%; 
            display: flex; flex-direction: row; align-items: center; 
            justify-content: space-between; z-index: 100; width: 100%; box-sizing: border-box;
        }
        .main-title { 
            font-weight: 900; text-transform: uppercase; line-height: 0.85; 
            font-size: 26px; letter-spacing: -1px; flex: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.7);
            color: white;
            padding-right: 10px;
        }
        .heart-box { 
            width: 115px; height: 115px; border-radius: 1.8rem; 
            border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            overflow: hidden; background: transparent; flex-shrink: 0; 
            display: flex; align-items: center; justify-content: center;
        }
        .heart-box img { width: 100%; height: 100%; object-fit: contain; }

        /* REPRODUCTOR FLOTANTE PREMIUM */
        .player-bar { 
            position: fixed; 
            bottom: 20px; left: 5%; right: 5%;
            width: 90%; max-width: 600px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(20px);
            padding: 12px 20px; 
            z-index: 5000; 
            display: flex; align-items: center; justify-content: space-between; 
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            color: white; 
        }
        .play-btn-circle {
            background: var(--red);
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .play-btn-circle:active { transform: scale(0.95); }

        @media (min-width: 1024px) { 
            .hero { height: 90vh; }
            .header-main { margin-top: -320px; max-width: 1200px; margin-left: auto; margin-right: auto; } 
            .heart-box { width: 350px; height: 350px; border-radius: 5rem; border: 15px solid white; } 
            .main-title { font-size: 75px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline>
            <source src="https://github.com/MorelDa/SPLENDOR-DISCO/raw/refs/heads/main/bbf558e35988d69e35269b3da740230a.mp4" type="video/mp4">
        </video>
    </div>

    <header class="header-main">
        <div class="main-title">
            PORTAL SAN<br>PEDRO <span class="text-[#ff7300]">SUR.</span>
        </div>
        <div class="heart-box">
            <img src="https://i.ibb.co/Y4xc5xz7/IMAGEN-512-X-512-PORTADA-Y-LOGO.png" alt="Logo">
        </div>
    </header>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl overflow-hidden bg-transparent flex items-center justify-center">
                <img src="https://i.ibb.co/Y4xc5xz7/IMAGEN-512-X-512-PORTADA-Y-LOGO.png" class="w-full h-full object-contain">
            </div>
            <div>
                <p class="font-bold text-[11px] uppercase tracking-wider truncate w-36">San Pedro Sur Live</p>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-[#ff7300] animate-pulse"></span>
                    <span class="text-[9px] font-bold tracking-widest opacity-80 uppercase text-[#ff7300]">AL AIRE</span>
                </div>
            </div>
        </div>
        <button id="play-btn" class="play-btn-circle">
            <i class="fas fa-play ml-0.5" id="play-icon"></i>
        </button>
    </div>

    <audio id="main-stream" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('main-stream');
        const playBtn = document.getElementById('play-btn');
        const streamUrl = "https://miestacion.turadioonline.com.ar/8072/stream";

        playBtn.onclick = () => {
            if (audio.paused) { 
                audio.src = streamUrl + "?t=" + Date.now(); 
                audio.play(); 
                document.getElementById('play-icon').className = 'fas fa-pause'; 
            } else { 
                audio.pause(); 
                audio.src = ""; 
                document.getElementById('play-icon').className = 'fas fa-play ml-0.5'; 
            }
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>

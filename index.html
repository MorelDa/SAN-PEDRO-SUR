<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
-webkit-tap-highlight-color: transparent;
}

body{
background:#050507;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
min-height:100dvh;
overflow:hidden;
}

.player-container{
width:100vw;
max-width:430px;
height:100vh;
height:100dvh;
background-color:#0f0f11;
position:relative;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

/* VIDEO DE FONDO - AHORA CUBRE EL 100% EVITANDO RECORTES RECTOS */
.bg-video-container {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%; /* Ocupa toda la pantalla detrás de todo */
overflow: hidden;
z-index: 0;
}

.bg-video-container video {
width: 100%;
height: 100%;
object-fit: cover;
opacity: 0.85;
}

/* Capa oscura progresiva sobre el video para garantizar la lectura de textos */
.bg-video-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: linear-gradient(to bottom, rgba(15,15,17,0.2) 0%, rgba(15,15,17,0.7) 100%);
z-index: 1;
}

/* LOGO - ORIGINAL */
.top-logo{
position:absolute;
top:18px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

.top-logo img{
width:82px;
object-fit:contain;
filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}

/* CONTROLES DE LA APP ARRIBA */
.top-app-controls {
position:absolute;
top:15px;
right:15px;
z-index:100;
display:flex;
gap:8px;
align-items:center;
}

.btn-top-pwa {
background: rgba(17, 17, 19, 0.5);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
color: white;
padding: 8px 12px;
border-radius: 20px;
font-size: 11px;
font-weight: bold;
display: flex;
align-items: center;
gap: 6px;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
cursor: pointer;
border: 1px solid rgba(255,255,255,0.08);
transition: all 0.2s ease;
}

.btn-top-pwa:active {
transform: scale(0.95);
background: rgba(255, 255, 255, 0.1);
}

#pwa-install-banner {
display: none; 
}

/* LOCUTOR - POSICIÓN EXACTA ORIGINAL SIN TOCAR COORDENADAS */
.locutor-wrap{
position:absolute;
bottom:0;
left:0;
width:100%;
height:100%;
z-index:1;
display:flex;
justify-content:center;
align-items:flex-end;
perspective:1200px;
}

.locutor-slider{
position:relative;
width:120%;
height:100%;
transform-style:preserve-3d;
transition:transform 1.4s ease-in-out;
}

.locutor-slider.rotate{
transform:rotateY(180deg);
}

.locutor-face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
display:flex;
justify-content:center;
align-items:flex-end;
}

.locutor-face img{
width:100%;
height:100%;
object-fit:contain;
object-position:center bottom;
transform: translateY(-25px);
filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
}

.front{transform:rotateY(0deg);}
.back{transform:rotateY(180deg);}

/* ONDA DE CORTE */
.wave-bottom{
position:absolute;
bottom:0;
left:0;
width:100%;
height:48%;
z-index:2;
pointer-events:none;
}

/* UI CONTENT CONTAINER */
.ui-content{
position:absolute;
bottom:calc(45px + env(safe-area-inset-bottom));
left:0;
width:100%;
height:100%;
z-index:3;
display:flex;
flex-direction:column;
align-items:center;
padding:0 24px 25px 24px;
box-sizing: border-box;
}

/* PLAYER GROUP */
.player-group{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
position: absolute;
bottom: 165px;
}

.status-badge{
background:#ffffff;
padding:5px 14px;
border-radius:20px 20px 0 0;
font-size:10px;
font-weight:bold;
color:#000;
display:flex;
align-items:center;
gap:6px;
margin-bottom:-1px;
z-index:5;
box-shadow: 0 -4px 10px rgba(0,0,0,0.15);
letter-spacing: 0.5px;
}

.live-dot{
width:7px;
height:7px;
background:#ff0055;
border-radius:50%;
animation:pulse 1.5s infinite;
}

/* BARRA REPRODUCTOR (GLASSMORPHISM) */
.black-player-bar{
width:76%;
height:76px;
background: rgba(15, 15, 19, 0.65);
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);
border-radius: 38px;
display:flex;
align-items:center;
padding:0 16px;
color:white;
border: 1px solid rgba(255, 255, 255, 0.08);
box-shadow:0 12px 35px rgba(0,0,0,0.5);
}

.station-avatar{
width:44px;
height:44px;
background:rgba(255,255,255,0.05);
border-radius:50%;
margin-right:10px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
flex-shrink: 0;
border: 1px solid rgba(255,255,255,0.1);
}

.station-avatar img{
width:32px;
height:32px;
object-fit:contain;
}

.track-text{flex:1;overflow:hidden;}
.track-text .title{font-weight:800;font-size:14px;white-space: nowrap; letter-spacing: 0.3px;}
.track-text .subtitle{color:rgba(255,255,255,0.6);font-size:11px;white-space: nowrap; font-weight: 500; margin-top: 1px;}

.spectators-tag{
background:rgba(255,255,255,0.15);
color:#fff;
font-size:9px;
font-weight:800;
padding:4px 8px;
border-radius:8px;
flex-shrink: 0;
display: flex;
align-items: center;
gap: 4px;
backdrop-filter: blur(5px);
}

/* TITULO */
.branding-text{
position: absolute;
bottom: 95px;
text-align:center;
color:white;
width: 100%;
padding: 0 20px;
}

.branding-text h1{
font-size:24px;
font-weight:900;
text-shadow: 0 4px 12px rgba(0,0,0,0.7);
letter-spacing: -0.5px;
}

.branding-text p{
font-size:13px;
font-weight: 600;
opacity:0.8;
letter-spacing: 1.5px;
margin-top: 2px;
}

/* BOTONES */
.action-controls{
position: absolute;
bottom: 15px;
display:flex;
width:100%;
max-width: 380px;
justify-content:space-between;
align-items:center;
padding:0 10px;
}

.btn-action-play{
width:84px;
height:84px;
background:#ffffff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:#ff6a00; /* Color Naranja en el Icono Play */
border:none;
cursor: pointer;
box-shadow: 0 8px 25px rgba(255,106,0,0.4);
transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.btn-action-play:hover {
transform: scale(1.05);
box-shadow: 0 12px 28px rgba(255,106,0,0.5);
}

.btn-action-play:active {
transform: scale(0.95);
}

.btn-action-secondary{
width:62px;
height:62px;
background:rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
border-radius:50%;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
cursor: pointer;
transition: all 0.3s ease;
}

.btn-action-secondary:hover {
background: rgba(255,255,255,0.15);
transform: translateY(-2px);
}

@keyframes pulse{
0%{transform:scale(0.9);opacity:1;}
50%{transform:scale(1.3);opacity:0.4;}
100%{transform:scale(0.9);opacity:1;}
}
</style>
</head>

<body>

<div class="player-container">

<!-- VIDEO DE FONDO INTEGRAL SIN CORTES -->
<div class="bg-video-container">
  <video autoplay loop muted playsinline poster="https://i.ibb.co/NdfHrzzK/Airbrush-BG-CHANGER-1775689938420-jpg.png">
    <source src="https://github.com/MorelDa/SAN-PEDRO-SUR/raw/refs/heads/main/66edefeff9505a207e39539b4e10c958.mp4" type="video/mp4">
  </video>
  <div class="bg-video-overlay"></div>
</div>

<div class="top-app-controls">
  <div class="btn-top-pwa" id="shareBtn">
    <i class="fa-solid fa-share-nodes"></i> Compartir
  </div>
  <div class="btn-top-pwa" id="pwa-install-banner">
    <i class="fa-solid fa-download"></i> Instalar App
  </div>
</div>

<div class="top-logo">
<img src="https://i.ibb.co/NdfHrzzK/Airbrush-BG-CHANGER-1775689938420-jpg.png">
</div>

<!-- LOCUTOR: Mismo contenedor e IDs sin alterar coordenadas -->
<div class="locutor-wrap">
<div class="locutor-slider" id="locutorSlider">
<div class="locutor-face front">
<img src="https://i.ibb.co/twfjwJLB/primdsbn.png">
</div>
<div class="locutor-face back">
<img src="https://i.ibb.co/fG4PzgN9/878.png">
</div>
</div>
</div>

<!-- ONDA DINÁMICA MODIFICADA A COLOR ANARANJADO PREMIUM -->
<svg class="wave-bottom" viewBox="0 0 500 500" preserveAspectRatio="none">
<defs>
  <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#ff6a00;stop-opacity:1" /> <!-- Naranja Enérgico -->
    <stop offset="100%" style="stop-color:#ee0979;stop-opacity:1" /> <!-- Transición Profunda -->
  </linearGradient>
</defs>
<path d="M0,170 C40,185 70,150 180,130 C350,90 400,260 500,200 L500,500 L0,500 Z" fill="url(#orange-grad)"></path>
</svg>

<div class="ui-content">

  <div class="player-group">
    <div class="status-badge">
      <span class="live-dot"></span>
      <span>AL AIRE AHORA</span>
    </div>
    <div class="black-player-bar">
      <div class="station-avatar">
        <img src="https://i.ibb.co/NdfHrzzK/Airbrush-BG-CHANGER-1775689938420-jpg.png">
      </div>
      <div class="track-text">
        <div class="title">SAN PEDRO SUR</div>
        <div class="subtitle">RADIO ONLINE</div>
      </div>
      <div class="spectators-tag">
        <i class="fa-solid fa-user"></i> 200
      </div>
    </div>
  </div>

  <div class="branding-text">
    <h1>PORTAL SAN PEDRO SUR</h1>
    <p>CON ESTILO MÚSICAL</p>
  </div>

  <div class="action-controls">
    <button class="btn-action-play" id="playBtn">
      <i class="fa-solid fa-play" id="playIcon"></i>
    </button>
    <button class="btn-action-secondary" onclick="window.open('https://wa.me/595986436870', '_blank')">
      <i class="fa-brands fa-whatsapp"></i>
    </button>
    <button class="btn-action-secondary" onclick="window.open('https://tiktok.com/@portalsanpedrosurpy', '_blank')">
      <i class="fa-brands fa-tiktok"></i>
    </button>
    <button class="btn-action-secondary" onclick="window.open('https://facebook.com/share/1FBX4M51B1/', '_blank')">
      <i class="fa-brands fa-facebook-f"></i>
    </button>
  </div>

</div>
</div>

<script>
const STREAM_URL = "https://miestacion.turadioonline.com.ar/8072/stream";
let audio = null;
let playing = false;

const playBtn = document.getElementById("playBtn");
const playIcon = document.getElementById("playIcon");

playBtn.onclick = () => {
  if (!playing) {
    if (!audio) {
      audio = new Audio(STREAM_URL);
    } else {
      audio.src = STREAM_URL; 
      audio.load();
    }
    audio.play().catch(err => console.log("Error de reproducción:", err));
    playIcon.className = "fa-solid fa-pause";
  } else {
    audio.pause();
    audio.src = ""; 
    playIcon.className = "fa-solid fa-play";
  }
  playing = !playing;
};

setInterval(() => {
  document.getElementById("locutorSlider").classList.toggle("rotate");
}, 6000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}

let deferredPrompt;
const installBanner = document.getElementById('pwa-install-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'flex'; 
});

installBanner.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      installBanner.style.display = 'none';
    }
    deferredPrompt = null;
  }
});

document.getElementById('shareBtn').addEventListener('click', async () => {
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'PORTAL SAN PEDRO SUR',
        text: 'PORTAL SAN PEDRO SUR - tu Radio online 🔥🎶',
        url: window.location.href
      });
    } catch (err) {
      console.log('Error al compartir:', err);
    }
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('¡Enlace copiado al portapapeles!');
  }
});
</script>
</body>
